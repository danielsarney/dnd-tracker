<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}D&D Tracker{% endblock %}</title>
    
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Custom CSS -->
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-brand">
                <a href="{% url 'home' %}">
                    <i class="fas fa-dice-d20"></i>
                    <span>D&D Tracker</span>
                </a>
            </div>
            
            <div class="nav-menu">
                {% if user.is_authenticated %}                    
                    <div class="nav-user">
                        <div class="user-dropdown">
                            <button class="user-dropdown-toggle" type="button">
                                {% if user.profile.avatar %}
                                    <img src="{{ user.profile.avatar.url }}" alt="Avatar" class="nav-avatar">
                                {% else %}
                                    <i class="fas fa-user"></i>
                                {% endif %}
                                <span class="user-name">{{ user.profile.get_display_name }}</span>
                                <i class="fas fa-chevron-down dropdown-arrow"></i>
                            </button>
                            <div class="user-dropdown-menu">
                                <a href="{% url 'accounts:profile' %}" class="dropdown-item">
                                    <i class="fas fa-user"></i>
                                    Profile
                                </a>
                                <a href="{% url 'logout' %}" class="dropdown-item">
                                    <i class="fas fa-sign-out-alt"></i>
                                    Logout
                                </a>
                            </div>
                        </div>
                    </div>
                {% else %}
                    <a href="{% url 'login' %}" class="nav-link">
                        <i class="fas fa-sign-in-alt"></i>
                        Login
                    </a>
                    <a href="{% url 'accounts:signup' %}" class="nav-link">
                        <i class="fas fa-user-plus"></i>
                        Sign Up
                    </a>
                {% endif %}
            </div>
            
            <div class="nav-toggle">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>
    
    <main class="main-content">
        {% block content %}{% endblock %}
    </main>
    
    <footer class="footer">
        <div class="footer-content">
            <p>&copy; {% now "Y" %} D&D Tracker. May your rolls be ever in your favor!</p>
        </div>
    </footer>
    
    <!-- Custom JavaScript -->
    <script src="{% static 'js/main.js' %}"></script>
</body>
</html>
