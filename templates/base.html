<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}D&D Tracker{% endblock %}</title>
</head>
<body>
    <nav>
        {% if user.is_authenticated %}
            <a href="{% url 'dashboard:dashboard' %}">Dashboard</a>
            <a href="{% url 'campaigns:campaign_list' %}">Campaigns</a>
            <a href="{% url 'characters:character_list' %}">Characters</a>
            <a href="{% url 'game_sessions:session_list' %}">Sessions</a>
            <a href="{% url 'accounts:profile' %}">Profile</a>
            <a href="{% url 'logout' %}">Logout</a>
        {% else %}
            <a href="{% url 'home' %}">Home</a>
            <a href="{% url 'login' %}">Login</a>
            <a href="{% url 'accounts:signup' %}">Sign Up</a>
        {% endif %}
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        <p>&copy; {% now "Y" %} D&D Tracker. All rights reserved.</p>
    </footer>
</body>
</html>
